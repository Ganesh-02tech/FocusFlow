<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="weblogo" href="favicon.png" type="image">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link https://www.flaticon.com/free-icon/lightbulb_19034600?term=bulb+glow&page=1&position=7&origin=search&related_id=19034600 >
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <header id="heading">
        Good Morning, Ganesh!! 👋
        
    </header>
<hr id="headingline">

    <div id="mytask">
        MyTask
    </div>
    
    <div  id="note">
        <img class="light" src="lightbulb.png" alt="bulb">
       <span>Plan your tasks the night before for a stress-free day.</span>

    </div>

    <section class="info">
    <div class="goal">
        <p id="ghunghat"> Today's Goal <br>Complete 5 tasks. </p>
        <p> you are on the right track! keep going 💪 </p>

    </div>

     <div class="nexttask">
        <p id="ghunghat"> Next Task</p>
        <p> GYM workout</p>
        <p> Health</p>
        <i class="fa-regular fa-clock"></i>
        <span>
        <p> 6:00 PM </p>
    </span>

    </div>

     <div class="streak">
        <p id="ghunghat"> Current Streak </p>
        <p id="milan">12 <br>
            days </p>
        <span> <i  class="fa-solid fa-fire"></i> </span>
         <p> Amazing!! keep it up </p>  

    </div>
    </section>

     <div>
        <p></p>

    </div>

     <div class="quickadd">

        <div class="night">
        <i class="fa-solid fa-circle-plus"></i>
        <span> Quick Add </span>
        </div>

        <p> Add a new task in seconds </p>

        <div id="newt">
        <i class="fa-solid fa-plus"></i>
        <span> New Task </span>
        </div>
        
    </div>
    <p></p>
    <p></p>

</body>
</html>
